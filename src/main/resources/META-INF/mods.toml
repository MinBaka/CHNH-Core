# 这是 CHNH-Core 的 NeoForge 模组配置文件喵
modLoader = "javafml" #mandatory
# 这里的版本范围会自动从您的 gradle.properties 读取喵
loaderVersion = "${loader_version_range}" #mandatory
license = "${mod_license}"

[[mods]] #mandatory
modId = "${mod_id}" #mandatory
version = "${mod_version}" #mandatory
displayName = "${mod_name}" #mandatory
authors = "${mod_authors}" #optional
description = '''${mod_description}'''

# 如果主人有 logo 图片，可以把下面这行取消注释，并把图片放进 resources 喵
#logoFile="logo.png" #optional

# 接下来是模组的依赖配置喵
[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required" # NeoForge 1.21.1 推荐使用 type 而不是 mandatory 喵
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# 喵！如果您要把 ApricityUI 作为运行时的硬性要求，也可以在这里加上它喵：
[[dependencies."${mod_id}"]]
modId = "apricityui"
type = "required"
versionRange = "[1.1.0,)" # 确保版本兼容 1.21.1 喵
ordering = "AFTER"
side = "CLIENT"